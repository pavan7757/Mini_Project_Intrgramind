<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 AI Search Engine - Inverted Index</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-search"></i> AI Search Engine</h1>
            <p>Powered by Inverted Indexes + MongoDB Atlas</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search documents... (try 'react', 'mongodb', 'node')" autocomplete="off">
            <button onclick="performSearch()"><i class="fas fa-search"></i></button>
            <div class="search-stats" id="stats"></div>
        </div>

        <div class="controls">
            <label>
                <input type="checkbox" id="titleBoost" checked> Title Boost (10x)
            </label>
            <label>
                Limit: <select id="limit">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                </select>
            </label>
        </div>

        <div class="results" id="results">
            <div class="loading" id="loading" style="display:none;">
                <i class="fas fa-spinner fa-spin"></i> Searching...
            </div>
            <div class="no-results" id="noResults" style="display:none;">
                <i class="fas fa-inbox"></i> No results found
            </div>
        </div>

        <div class="stats-panel">
            <button onclick="showHealth()">Engine Status</button>
            <div id="healthPanel" class="health-panel"></div>
        </div>

        <div class="add-doc">
            <h3><i class="fas fa-plus"></i> Add Test Document</h3>
            <input type="text" id="docTitle" placeholder="Title">
            <textarea id="docContent" placeholder="Content"></textarea>
            <button onclick="addDocument()">Add Document</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
